<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Preview</title>
</head>
<body>
  <div id="previewApp" class="theme-light">
    <header class="preview-header">
      <h1 id="previewTitle">Markdown 预览</h1>
      <div class="preview-actions">
        <select id="previewThemeSelect" class="theme-select" title="主题切换">
          <option value="light">☀️ 浅色</option>
          <option value="dark">🌙 深色</option>
          <option value="eye">👁️ 护眼</option>
        </select>
        <button id="backToEditor" class="btn btn-primary">← 返回编辑器</button>
      </div>
    </header>
    <main class="preview-content">
      <div id="previewBody" class="markdown-body"></div>
    </main>
  </div>
</body>
</html>
